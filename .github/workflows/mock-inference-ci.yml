name: Mock Inference CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Run mock inference tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            services/mock_inference/requirements.txt
            services/mock_inference/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            -r services/mock_inference/requirements-dev.txt

      - name: Run tests
        run: |
          python -m pytest services/mock_inference/tests -v

  container-build:
    name: Build mock inference container
    runs-on: ubuntu-latest
    needs:
      - test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/mock_inference/Dockerfile
          push: false
          tags: mock-inference:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max