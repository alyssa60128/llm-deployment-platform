services:
  mock-inference:
    build:
      context: .
      dockerfile: services/mock_inference/Dockerfile

    container_name: mock-inference

    environment:
      OTEL_TRACING_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      DEPLOYMENT_ENVIRONMENT: local

    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:v3.12.0

    container_name: prometheus

    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    ports:
      - "9090:9090"

    depends_on:
      - mock-inference

  grafana:
    image: grafana/grafana:12.4.4

    container_name: grafana

    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}

    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: grafana/loki:3.7.2

    container_name: loki

    command:
      - -config.file=/etc/loki/local-config.yaml

    volumes:
      - loki-data:/loki

    ports:
      - "3100:3100"

  alloy:
    image: grafana/alloy:v1.17.0

    container_name: alloy

    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy

    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro #
      - alloy-data:/var/lib/alloy/data

    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"

    depends_on:
      - loki
      - tempo
      - mock-inference

  tempo:
    image: grafana/tempo:latest

    container_name: tempo

    command:
      - -config.file=/etc/tempo/tempo.yml

    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo

    ports:
      - "3200:3200"

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  alloy-data:
  tempo-data: